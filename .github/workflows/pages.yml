name: Deploy VitePress Docs

on:
  push:
    branches: [master, main]
    paths:
      - 'site/**'
      - 'README.md'
      - 'README.zh-CN.md'
      - 'CHANGELOG.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build VitePress Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci || npm install

      - name: Build VitePress
        working-directory: site
        run: npm run build

      - name: Add .nojekyll
        run: touch site/.vitepress/dist/.nojekyll

      - name: Verify Build Output
        run: |
          echo "Verifying build output..."
          ls -la site/.vitepress/dist/

          if [ ! -f "site/.vitepress/dist/index.html" ]; then
            echo "❌ ERROR: index.html not found!"
            exit 1
          fi
          echo "✅ index.html exists"

          if [ ! -d "site/.vitepress/dist/en" ]; then
            echo "❌ ERROR: en directory not found!"
            exit 1
          fi
          echo "✅ en directory exists"

          if [ ! -d "site/.vitepress/dist/zh-CN" ]; then
            echo "❌ ERROR: zh-CN directory not found!"
            exit 1
          fi
          echo "✅ zh-CN directory exists"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/.vitepress/dist

  deploy:
    name: Deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
