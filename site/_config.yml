title: N-Body Particle Simulation
description: >-
  Million-particle GPU simulation — Direct N², Barnes-Hut, Spatial Hash
  with CUDA-OpenGL interop real-time rendering
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/n-body
show_downloads: true

# SEO & metadata
url: https://lessup.github.io
baseurl: /n-body
lang: en
author: LessUp

# Navigation
nav:
  - title: Home
    url: /
  - title: Documentation
    url: docs/
  - title: API Reference
    url: docs/API.html
  - title: Changelog
    url: changelog/
  - title: GitHub
    url: https://github.com/LessUp/n-body
    external: true

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "docs"
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default

# Exclude irrelevant files from Jekyll build
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - include
  - src
  - shaders
  - tests
  - examples
  - build
  - cmake-build-*
  - CMakeLists.txt
  - .clang-format
  - .editorconfig
  - .gitignore
  - .markdownlint.json
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.cu"
  - "*.cuh"
  - "*.cpp"
  - "*.hpp"
  - "*.o"
  - "*.so"
  - "*.a"
  - Doxyfile
  - Doxyfile.in

# Include specific files
include:
  - LICENSE
  - CHANGELOG.md

# Plugins configuration
whitelist:
  - jekyll-remote-theme
  - jekyll-seo-tag

# GitHub metadata
github:
  repository_name: n-body
  owner_name: LessUp

# Collections (optional for future use)
collections:
  docs:
    output: true
    permalink: /:collection/:path
  changelog:
    output: true
    permalink: /:collection/:path
