# N-Body Simulation - GitHub Pages Configuration
# ================================================
# Modern Jekyll configuration for product-style landing page

# Site Settings
# -------------
title: "N-Body Simulation"
tagline: "Million-Particle GPU Physics Engine"
description: >-
  High-performance N-body particle simulation with Direct N², Barnes-Hut, and Spatial Hash algorithms.
  Real-time CUDA-OpenGL interop rendering for up to 1 million particles.

url: "https://lessup.github.io"
baseurl: "/n-body"

# Author Information
author:
  name: "LessUp"
  github: "LessUp"
  twitter: "lessup_dev"

# Repository
repository: "LessUp/n-body"
github_username: "LessUp"

# Language & Encoding
lang: "en"
encoding: "utf-8"
timezone: "UTC"

# Multi-language Settings
languages: ["en", "zh-CN"]
default_lang: "en"

# Build Settings
# --------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    line_numbers: true
    line_numbers_start: 1
    span:
      line_numbers: false

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

gem:
  - kramdown-parser-gfm

# Sass Settings
sass:
  sass_dir: _sass
  style: compressed

# Collections
# -----------
collections:
  docs:
    output: true
    permalink: /:collection/:name/
  changelog:
    output: true
    permalink: /:collection/:path/

# Default Front Matter
# --------------------
defaults:
  # Homepage
  - scope:
      path: "index.md"
      type: "pages"
    values:
      layout: "home"
  # Documentation
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "docs"
  # Changelog
  - scope:
      path: ""
      type: "changelog"
    values:
      layout: "page"
  # All pages
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Navigation
# ----------
navigation:
  main:
    - title: "Home"
      url: "/"
      icon: "home"
    - title: "Docs"
      url: "/docs/"
      icon: "book-open"
    - title: "Changelog"
      url: "/changelog/"
      icon: "history"
    - title: "GitHub"
      url: "https://github.com/LessUp/n-body"
      icon: "github"
      external: true

  docs:
    - title: "Getting Started"
      url: "/docs/getting-started/"
      icon: "rocket"
    - title: "Architecture"
      url: "/docs/architecture/"
      icon: "layers"
    - title: "Algorithms"
      url: "/docs/algorithms/"
      icon: "cpu"
    - title: "API Reference"
      url: "/docs/api/"
      icon: "code"
    - title: "Performance"
      url: "/docs/performance/"
      icon: "zap"

# Chinese Navigation (中文导航)
navigation_zh:
  main:
    - title: "首页"
      url: "/zh-CN/"
      icon: "home"
    - title: "文档"
      url: "/zh-CN/docs/"
      icon: "book-open"
    - title: "更新日志"
      url: "/zh-CN/changelog/"
      icon: "history"
    - title: "GitHub"
      url: "https://github.com/LessUp/n-body"
      icon: "github"
      external: true

  docs:
    - title: "快速入门"
      url: "/zh-CN/docs/getting-started/"
      icon: "rocket"
    - title: "架构概览"
      url: "/zh-CN/docs/architecture/"
      icon: "layers"
    - title: "算法详解"
      url: "/zh-CN/docs/algorithms/"
      icon: "cpu"
    - title: "API 参考"
      url: "/zh-CN/docs/api/"
      icon: "code"
    - title: "性能指南"
      url: "/zh-CN/docs/performance/"
      icon: "zap"

# Features for Homepage
features:
  - title: "GPU Accelerated"
    description: "CUDA parallel processing with one thread per particle"
    icon: "zap"
  - title: "Three Algorithms"
    description: "Direct N², Barnes-Hut O(N log N), Spatial Hash O(N)"
    icon: "git-branch"
  - title: "Zero-Copy Rendering"
    description: "CUDA-OpenGL interop eliminates CPU↔GPU data transfer"
    icon: "refresh-cw"
  - title: "Energy Conserving"
    description: "Velocity Verlet symplectic integration"
    icon: "activity"
  - title: "Real-time 60+ FPS"
    description: "Smooth visualization for up to 1 million particles"
    icon: "eye"
  - title: "Cross-Platform"
    description: "Linux, Windows, macOS with NVIDIA GPU"
    icon: "monitor"

# Features for Homepage (Chinese)
features_zh:
  - title: "GPU 加速"
    description: "CUDA 并行处理，每个粒子一个线程"
    icon: "zap"
  - title: "三种算法"
    description: "直接 N²、Barnes-Hut O(N log N)、空间哈希 O(N)"
    icon: "git-branch"
  - title: "零拷贝渲染"
    description: "CUDA-OpenGL 互操作，消除 CPU↔GPU 数据传输"
    icon: "refresh-cw"
  - title: "能量守恒"
    description: "Velocity Verlet 辛积分器"
    icon: "activity"
  - title: "实时 60+ FPS"
    description: "流畅可视化，支持高达 100 万粒子"
    icon: "eye"
  - title: "跨平台"
    description: "支持 Linux、Windows、macOS（需 NVIDIA GPU）"
    icon: "monitor"

# Algorithm Cards
algorithms:
  - name: "Direct N²"
    complexity: "O(N²)"
    description: "Exact pairwise force calculation"
    best_for: "≤10K particles"
    color: "blue"
  - name: "Barnes-Hut"
    complexity: "O(N log N)"
    description: "Hierarchical octree approximation"
    best_for: "Large gravitational systems"
    color: "green"
  - name: "Spatial Hash"
    complexity: "O(N)"
    description: "Grid-based short-range forces"
    best_for: "Molecular dynamics"
    color: "purple"

# Algorithm Cards (Chinese)
algorithms_zh:
  - name: "直接 N²"
    complexity: "O(N²)"
    description: "精确的成对力计算"
    best_for: "≤1万 粒子"
    color: "blue"
  - name: "Barnes-Hut"
    complexity: "O(N log N)"
    description: "层次八叉树近似"
    best_for: "大型引力系统"
    color: "green"
  - name: "空间哈希"
    complexity: "O(N)"
    description: "基于网格的短程力"
    best_for: "分子动力学"
    color: "purple"

# Performance Data (for charts)
performance:
  hardware: "NVIDIA RTX 3080, CUDA 11.8"
  data:
    - particles: "10K"
      direct: 60
      barnes_hut: 120
      spatial_hash: 120
    - particles: "100K"
      direct: 10
      barnes_hut: 60
      spatial_hash: 90
    - particles: "1M"
      direct: 1
      barnes_hut: 25
      spatial_hash: 60

# SEO Settings
# ------------
seo:
  type: "SoftwareApplication"
  name: "N-Body Particle Simulation"
  application_category: "Scientific Application"
  operating_system: ["Linux", "Windows", "macOS"]
  keywords: "n-body simulation, CUDA, GPU physics, particle simulation, Barnes-Hut, spatial hash, OpenGL"

# Social Media
social:
  twitter:
    username: "lessup_dev"
    card: "summary_large_image"
  github:
    username: "LessUp"
    repository: "LessUp/n-body"

# Exclude Files
# -------------
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor/
  - node_modules/
  - "*.gemspec"
  - ".sass-cache/"
  - ".jekyll-cache/"
  - ".jekyll-metadata"

# Build Settings
# --------------
keep_files:
  - .git
  - .nojekyll

# Development Settings
# --------------------
port: 4000
host: 127.0.0.1
livereload: true

# Custom Variables
# ----------------
version: "2.0.0"
license: "MIT"
