# Site Settings
title: N-Body Simulation
tagline: Million-Particle GPU Physics Engine
description: >-
  High-performance N-body simulation with Direct N², Barnes-Hut, and Spatial Hash algorithms.
  Real-time CUDA-OpenGL interop rendering for up to 1 million particles.
url: "https://lessup.github.io"
baseurl: "/n-body"

# Theme & Plugins
remote_theme: pmarsceill/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Repository
repository: LessUp/n-body
gh_repo: https://github.com/LessUp/n-body

# Language & Encoding
lang: en
encoding: utf-8

# Markdown Settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    line_numbers: false

# Just the Docs Theme Settings
color_scheme: dark
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# Navigation Structure
nav_enabled: true
nav_sort: case_sensitive

# Aux Links
aux_links:
  "View on GitHub":
    - "https://github.com/LessUp/n-body"
aux_links_new_tab: true

# Footer
footer_content: "Copyright &copy; 2024-2026 LessUp. Released under MIT License."
back_to_top: true
back_to_top_text: "Back to Top"

# Last Modified Timestamp
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

# Collections
collections:
  docs:
    permalink: "/:collection/:path"
    output: true

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      nav_order: 1
  - scope:
      path: "docs"
    values:
      layout: "default"
      has_children: true
      nav_order: 2
  - scope:
      path: "changelog"
    values:
      layout: "default"
      nav_order: 3

# Exclude from Build
exclude:
  - .git
  - node_modules
  - vendor
  - "*.gem"
  - Gemfile
  - Gemfile.lock
